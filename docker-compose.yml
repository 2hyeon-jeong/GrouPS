version: '3.8'

services:
  # PostgreSQL 데이터베이스
  db:
    image: postgres:15-alpine
    container_name: boj_soma_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: boj_user
      POSTGRES_PASSWORD: boj_password
      POSTGRES_DB: boj_soma_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boj_user -d boj_soma_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - boj_network

  # FastAPI 백엔드 API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: boj_soma_api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://boj_user:boj_password@db:5432/boj_soma_db
      - SECRET_KEY=your-super-secret-key-change-in-production-make-it-very-long
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./frontend:/app/frontend
    depends_on:
      db:
        condition: service_healthy
    networks:
      - boj_network

networks:
  boj_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
