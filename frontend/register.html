<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - BOJ Squad</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-lg">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <a href="/" style="text-decoration: none; color: inherit;">
                                <h3 class="fw-bold">
                                    <i class="bi bi-shield-fill-check text-primary"></i> BOJ Squad
                                </h3>
                            </a>
                        </div>
                        <h1 class="text-center mb-4">
                            <i class="bi bi-person-plus-fill text-primary"></i>
                            회원가입
                        </h1>
                        <p class="text-center text-muted mb-4">
                            백준 계정을 연동하여 시작하세요
                        </p>
                        
                        <!-- 회원가입 폼 -->
                        <form id="registerForm">
                            <div class="mb-3">
                                <label for="handle" class="form-label">
                                    <i class="bi bi-code-square"></i> 백준 핸들 (아이디)
                                </label>
                                <div class="input-group">
                                    <input 
                                        type="text" 
                                        class="form-control" 
                                        id="handle" 
                                        name="handle"
                                        placeholder="백준 아이디를 입력하세요"
                                        required
                                    >
                                    <button 
                                        class="btn btn-outline-primary" 
                                        type="button" 
                                        id="verifyBtn"
                                        title="백준 계정 실명확인"
                                    >
                                        <i class="bi bi-shield-check"></i> 검증
                                    </button>
                                </div>
                                <div class="form-text">백준(BOJ) 아이디를 입력하고 검증 버튼을 눌러주세요</div>
                                <div id="handleVerifyResult" class="mt-2"></div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="password" class="form-label">
                                    <i class="bi bi-lock-fill"></i> 비밀번호
                                </label>
                                <input 
                                    type="password" 
                                    class="form-control" 
                                    id="password" 
                                    name="password"
                                    placeholder="비밀번호를 입력하세요"
                                    required
                                    minlength="4"
                                >
                                <div class="form-text">최소 4자 이상</div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="passwordConfirm" class="form-label">
                                    <i class="bi bi-lock-fill"></i> 비밀번호 확인
                                </label>
                                <input 
                                    type="password" 
                                    class="form-control" 
                                    id="passwordConfirm" 
                                    name="passwordConfirm"
                                    placeholder="비밀번호를 다시 입력하세요"
                                    required
                                >
                            </div>
                            
                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-primary btn-lg" id="registerSubmitBtn">
                                    <span id="registerBtnText">
                                        <i class="bi bi-person-plus"></i> 회원가입
                                    </span>
                                    <span id="registerSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                                </button>
                            </div>
                        </form>
                        
                        <hr class="my-4">
                        
                        <!-- 로그인 링크 -->
                        <div class="text-center">
                            <p class="text-muted mb-2">이미 계정이 있으신가요?</p>
                            <a href="/static/login.html" class="btn btn-outline-secondary">
                                <i class="bi bi-box-arrow-in-right"></i> 로그인
                            </a>
                        </div>
                    </div>
                </div>
                
                <!-- 푸터 -->
                <div class="text-center mt-3 text-muted">
                    <small>© 2026 BOJ Squad v0.1.0</small>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS -->
    <script src="/js/register.js"></script>
</body>
</html>
