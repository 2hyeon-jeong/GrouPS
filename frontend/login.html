<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - BOJ Squad</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow-lg">
                    <div class="card-body p-5">
                        <h1 class="text-center mb-4">
                            <a href="/" style="text-decoration: none; color: inherit;">
                                <i class="bi bi-trophy-fill text-warning"></i>
                                BOJ Squad
                            </a>
                        </h1>
                        <p class="text-center text-muted mb-4">
                            백준 그룹 관리 및 분석 서비스
                        </p>
                        
                        <!-- 로그인 폼 -->
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="handle" class="form-label">
                                    <i class="bi bi-person-fill"></i> 백준 아이디
                                </label>
                                <input 
                                    type="text" 
                                    class="form-control" 
                                    id="handle" 
                                    name="handle"
                                    placeholder="백준 아이디를 입력하세요"
                                    required
                                    autocomplete="username"
                                >
                            </div>
                            
                            <div class="mb-3">
                                <label for="password" class="form-label">
                                    <i class="bi bi-lock-fill"></i> 비밀번호
                                </label>
                                <input 
                                    type="password" 
                                    class="form-control" 
                                    id="password" 
                                    name="password"
                                    placeholder="비밀번호를 입력하세요"
                                    required
                                    autocomplete="current-password"
                                >
                            </div>
                            
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary btn-lg" id="loginBtn">
                                    <span id="loginBtnText">
                                        <i class="bi bi-box-arrow-in-right"></i> 로그인
                                    </span>
                                    <span id="loginSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                                </button>
                            </div>
                        </form>
                        
                        <hr class="my-4">
                        
                        <!-- 회원가입 버튼 -->
                        <div class="text-center">
                            <p class="text-muted mb-2">계정이 없으신가요?</p>
                            <a href="/static/register.html" class="btn btn-outline-primary">
                                <i class="bi bi-person-plus"></i> 회원가입
                            </a>
                        </div>
                    </div>
                </div>
                
                <!-- 푸터 -->
                <div class="text-center mt-3 text-muted">
                    <small>© 2026 BOJ Squad v0.1.0</small>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS -->
    <script src="/js/login.js"></script>
</body>
</html>
