<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOJ Squad - 함께 성장하는 알고리즘 스터디</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-shield-fill-check"></i> BOJ Squad
            </a>
            
            <div class="ms-auto" id="navbarContent">
                <!-- 비로그인 시 -->
                <div id="guestNav">
                    <a href="/login.html" class="btn btn-outline-light me-2">
                        <i class="bi bi-box-arrow-in-right"></i> 로그인
                    </a>
                    <a href="/register.html" class="btn btn-light">
                        <i class="bi bi-person-plus"></i> 회원가입
                    </a>
                </div>
                
                <!-- 로그인 시 -->
                <div id="userNav" class="d-none">
                    <span class="text-white me-3">
                        <i class="bi bi-person-circle"></i> <span id="userHandle"></span>님
                    </span>
                    <button class="btn btn-outline-light" onclick="logout()">
                        <i class="bi bi-box-arrow-right"></i> 로그아웃
                    </button>
                </div>
            </div>
        </div>
    </nav>
    
    <!-- Hero Section (비로그인 시) -->
    <section id="heroSection" class="hero-section">
        <div class="container text-center">
            <div class="hero-content">
                <h1 class="display-3 fw-bold mb-4">
                    <i class="bi bi-trophy-fill text-warning"></i>
                    함께 성장하는 코딩 스터디, BOJ Squad
                </h1>
                <p class="lead text-white-50 mb-5">
                    혼자 푸는 알고리즘은 이제 그만.<br>
                    그룹을 만들어 함께 도전하세요.
                </p>
                <a href="/login.html" class="btn btn-light btn-lg px-5 py-3">
                    <i class="bi bi-rocket-takeoff"></i> 시작하기
                </a>
            </div>
        </div>
    </section>
    
    <!-- Dashboard (로그인 시) -->
    <main id="dashboardSection" class="d-none">
        <div class="container py-5">
            <!-- Section 1: My Guilds -->
            <section class="mb-5">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold">
                        <i class="bi bi-people-fill text-primary"></i> My Guilds
                    </h2>
                </div>
                
                <div class="row g-4" id="myGroupsContainer">
                    <!-- [+ 그룹 만들기] 카드 -->
                    <div class="col-md-4">
                        <div class="card guild-card create-guild-card h-100" onclick="showCreateGroupModal()">
                            <div class="card-body text-center d-flex flex-column justify-content-center">
                                <div class="guild-icon-large mb-3">
                                    <i class="bi bi-plus-circle"></i>
                                </div>
                                <h5 class="card-title">그룹 만들기</h5>
                                <p class="text-muted">새로운 스터디를 시작하세요</p>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 그룹 카드들이 여기에 동적으로 추가됨 -->
                </div>
                
                <div id="noGroupsMessage" class="text-center text-muted mt-4 d-none">
                    <i class="bi bi-inbox"></i> 아직 가입한 그룹이 없습니다. 그룹을 만들어보세요!
                </div>
            </section>
            
            <!-- Section 2: Ranking -->
            <section>
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold">
                        <i class="bi bi-trophy text-warning"></i> 명예의 전당
                    </h2>
                    <span class="badge bg-primary">TOP 5</span>
                </div>
                
                <div class="card shadow-sm">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0" id="rankingTable">
                                <thead class="table-light">
                                    <tr>
                                        <th width="10%">순위</th>
                                        <th width="10%">아이콘</th>
                                        <th>그룹명</th>
                                        <th width="20%">해결 문제 수</th>
                                    </tr>
                                </thead>
                                <tbody id="rankingTableBody">
                                    <!-- 랭킹 데이터가 여기에 동적으로 추가됨 -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>
    
    <!-- 그룹 만들기 모달 -->
    <div class="modal fade" id="createGroupModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">
                        <i class="bi bi-plus-circle"></i> 새 그룹 만들기
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="createGroupForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold">그룹명 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="groupName" required maxlength="100" placeholder="예: 알고리즘 스터디">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">한 줄 소개 <span class="text-danger">*</span></label>
                            <textarea class="form-control" id="groupDescription" rows="2" required placeholder="그룹에 대한 간단한 소개를 입력하세요"></textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">그룹 아이콘</label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="groupIcon" value="🎯" maxlength="10" placeholder="이모지 입력">
                                <button type="button" class="btn btn-outline-secondary" onclick="randomIcon()">
                                    <i class="bi bi-shuffle"></i> 랜덤
                                </button>
                            </div>
                            <small class="text-muted">이모지를 입력하거나 랜덤 버튼을 눌러주세요</small>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">최대 인원 수</label>
                            <input type="number" class="form-control" id="groupMaxMembers" value="10" min="2" max="100">
                            <small class="text-muted">2명 ~ 100명</small>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">비밀번호 (선택)</label>
                            <input type="password" class="form-control" id="groupPassword" placeholder="비공개 그룹으로 만들려면 입력">
                            <small class="text-muted">비밀번호를 설정하면 비공개 그룹이 됩니다</small>
                        </div>
                        
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-check-circle"></i> 생성하기
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 로그인 모달 -->
    <div class="modal fade" id="loginModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">
                        <i class="bi bi-box-arrow-in-right"></i> 로그인
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">백준 아이디</label>
                            <input type="text" class="form-control" id="loginHandle" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">비밀번호</label>
                            <input type="password" class="form-control" id="loginPassword" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">로그인</button>
                        </div>
                    </form>
                    <hr>
                    <div class="text-center">
                        <p class="mb-2">계정이 없으신가요?</p>
                        <a href="/static/register.html" class="btn btn-outline-secondary">회원가입</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS -->
    <script src="/js/app.js"></script>
</body>
</html>
